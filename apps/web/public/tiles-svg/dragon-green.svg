<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 240">
  <defs>
    <linearGradient id="face" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fdfbf5"/>
      <stop offset="100%" stop-color="#f0e8d8"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <g id="tile">
    <rect x="6" y="6" width="168" height="228" rx="14" ry="14" fill="#d4c8b0" filter="url(#shadow)"/>
    <rect x="8" y="8" width="164" height="224" rx="12" ry="12" fill="url(#face)"/>
    <rect x="14" y="14" width="152" height="212" rx="8" ry="8" fill="none" stroke="#e8dfd0" stroke-width="1.5"/>
  </g>
  <g id="face" fill="#2e7d32" stroke="#1b5e20" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- 發 (Green Dragon) -->
    <!-- Top horizontal -->
    <path d="M 50 55 L 130 55" stroke-width="5"/>
    <!-- Left vertical -->
    <path d="M 65 55 L 65 185" stroke-width="5"/>
    <!-- Right vertical -->
    <path d="M 115 55 L 115 185" stroke-width="5"/>
    <!-- Middle horizontal -->
    <path d="M 65 95 L 115 95" stroke-width="5"/>
    <!-- Inner top diagonal -->
    <path d="M 75 70 L 105 70" stroke-width="3"/>
    <path d="M 75 70 L 75 85" stroke-width="3"/>
    <path d="M 105 70 L 105 85" stroke-width="3"/>
    <!-- Center diagonal stroke -->
    <path d="M 85 95 L 75 120 L 105 120" stroke-width="4" fill="none"/>
    <!-- Lower box -->
    <path d="M 65 140 L 115 140" stroke-width="4"/>
    <path d="M 65 170 L 115 170" stroke-width="4"/>
    <path d="M 90 120 L 90 185" stroke-width="4"/>
    <!-- Bottom tie -->
    <path d="M 50 185 L 130 185" stroke-width="5"/>
    <!-- Dot -->
    <circle cx="90" cy="155" r="5" fill="#2e7d32" stroke="#1b5e20" stroke-width="2"/>
  </g>
</svg>
